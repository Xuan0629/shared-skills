version: "2.0"
project_root: "/home/sean/shared-skills"
mode: "code-dev"
agents:
  developer: {role: developer, runtime: claude, model: claude-sonnet-4-6, system_prompt_path: "/home/sean/shared-skills/.unison/prompts/dev-p3.md", pipeline_role: developer}
  reviewer:  {role: reviewer,  runtime: codex, model: gpt-5.5, system_prompt_path: "/home/sean/shared-skills/.unison/prompts/review-generic.md", pipeline_role: reviewer}
project:
  test_command: "python3 -c "import json; [print(json.loads(l)['skill']) for l in open('sync.log') if l.strip()]" 2>/dev/null || python3 -c "print('sync log will be created on first sync')""
  max_iterations: 3
  per_agent_timeout: 600
budget:
  daily_token_limit: 5000000
  per_task_limit: 500000
